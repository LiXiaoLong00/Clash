# 百度代理独立配置文件 - 无健康检测版本
# 保存为 baidu-proxy.yaml 后，可直接导入或在主配置中引用

# 百度代理通用锚点
Baidu: &Baidu
  type: http
  port: 443
  skip-cert-verify: true
  headers:
    With-At: gw.alicdn.com
    Host: "153.3.236.22:443"
    X-T5-Auth: "683556433"

# 代理节点列表
proxies:
  # 百度代理节点集合
  - name: 🇨🇳 公共域名1
    server: "cloudnproxy.n.shifen.com"
    <<: *Baidu

  - name: 🇨🇳 动态域名2
    server: "cloudnproxy.baidu.com"
    <<: *Baidu

  - name: 🇨🇳 动态域名3
    server: "dx.baidu.anxray.top"
    <<: *Baidu

  - name: 🇨🇳 北京0
    server: "220.181.33.174"
    <<: *Baidu

  - name: 🇨🇳 北京1
    server: "220.181.111.189"
    <<: *Baidu

  - name: 🇨🇳 江苏南京
    server: "153.3.237.117"
    <<: *Baidu

  - name: 🇨🇳 江苏宿迁
    server: "157.0.146.158"
    <<: *Baidu

  - name: 🇨🇳 上海1
    server: "14.215.182.75"
    <<: *Baidu